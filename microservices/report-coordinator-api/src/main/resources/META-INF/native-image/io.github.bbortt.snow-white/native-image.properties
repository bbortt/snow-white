# sun.security.util.Password$ConsoleHolder calls System.console() in its static initializer,
# which in Java 25 returns a ProxyingConsole that lands in the image heap. Marking ProxyingConsole
# for build-time init is blocked because its supertype (java.io.Console) is JNI-bound to run-time.
# Forcing ConsoleHolder itself to run-time initialization prevents the object from ever being
# captured in the heap.
Args = --initialize-at-run-time=sun.security.util.Password\$ConsoleHolder
