name: Application CI

on:
  push:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: 'Build and Test'
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          submodules: true
      - name: Check if PR exists
        uses: 8BitJonny/gh-get-current-pr@4056877062a1f3b624d5d4c2bedefa9cf51435c9 # ratchet:8BitJonny/gh-get-current-pr@4.0.0
        id: check
        with:
          filterOutClosed: true
          filterOutDraft: true
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Fetch Helm Dependencies
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add influxdata https://helm.influxdata.com
          helm repo add kafbat-ui https://kafbat.github.io/helm-charts
          helm dependency build
        working-directory: 'helm/charts/snow-white'
      - name: Build with Maven
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: ./mvnw -B -Pprod verify
      - name: Upload CLI Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          name: cli
          path: toolkit/cli/target/snow-white-*
          if-no-files-found: error
      - name: Fetch References
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: git fetch --unshallow origin
      - name: Cache SonarQube Packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Sonar Analysis
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=bbortt-github \
            -Dsonar.projectKey=bbortt_snow-white
  prettier-post-release:
    name: 'Run Prettier on Release PR'
    if: ${{ startsWith(github.head_ref, 'release-please-') }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # ratchet:pnpm/action-setup@v6.0.0
        name: Install pnpm
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 24
      - name: Install Dependencies
        run: pnpm install
      - name: Run prettier:format
        run: pnpm run prettier:format
      - name: Git Configuration
        run: |
          git config user.name "Timon Borter"
          git config user.email "timon.borter@gmx.ch"
      - name: Commit Changes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git commit -a -m "chore(release-please): release changes cleanup"
            git push
          fi
