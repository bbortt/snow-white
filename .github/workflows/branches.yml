name: Application CI

on:
  push:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: true
      - name: Check if PR exists
        uses: 8BitJonny/gh-get-current-pr@4056877062a1f3b624d5d4c2bedefa9cf51435c9
        id: check
        with:
          filterOutClosed: true
          filterOutDraft: true
      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Fetch Helm Dependencies
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add influxdata https://helm.influxdata.com
          helm repo add kafbat-ui https://kafbat.github.io/helm-charts
          helm dependency build
        working-directory: 'helm/charts/snow-white'
      - name: Build with Maven
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: ./mvnw -B -Pprod verify
      - name: Upload CLI Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          name: cli
          path: toolkit/cli/target/snow-white-*
          if-no-files-found: error
      - name: Fetch References
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        run: git fetch --unshallow origin
      - name: Cache SonarQube Packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Sonar Analysis
        if: github.ref == 'refs/heads/main' || steps.check.outputs.pr_found == 'false'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=bbortt-github \
            -Dsonar.projectKey=bbortt_snow-white
  prettier-post-release:
    name: Run Prettier on Release PR
    runs-on: ubuntu-latest
    environment: release
    if: ${{ startsWith(github.head_ref, 'release-please-') || startsWith(github.ref, 'refs/heads/release-please-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          cache: 'pnpm'
          node-version: 24
      - name: Install Dependencies
        run: pnpm install
      - name: Run prettier:format
        run: pnpm run prettier:format
      - name: Git Configuration
        run: |
          git config user.name "Timon Borter"
          git config user.email "timon.borter@gmx.ch"
      - name: Commit Changes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git commit -a -m "chore(release-please): release changes cleanup"
            git push
          fi
