name: Application CI

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: 'Build and Test'
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Check if PR exists
        uses: 8BitJonny/gh-get-current-pr@3.0.0
        id: check
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        if: '!steps.check.outputs.number'
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 21
      - name: Cache SonarQube Packages
        uses: actions/cache@v4
        if: '!steps.check.outputs.number'
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Version Report
        if: '!steps.check.outputs.number'
        run: ./mvnw --version
      - name: Build with Maven
        if: '!steps.check.outputs.number'
        run: ./mvnw -B -Pprod -Dfailsafe.rerunFailingTestsCount=2 verify
      - name: Sonar Analysis
        if: '!steps.check.outputs.number'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=bbortt-github \
            -Dsonar.projectKey=bbortt_snow-white
  native-app-tests:
    name: 'Native Application Tests'
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      matrix:
        service:
          [kafka-event-filter, quality-gate-api, report-coordination-service]
      fail-fast: false
    services:
      kafka:
        image: bitnami/kafka:4.0.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_CFG_ADVERTISED_LISTENERS: 'PLAINTEXT://127.0.0.1:9092,EXTERNAL://kafka:9094'
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: '1@127.0.0.1:9093'
          KAFKA_CFG_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
          KAFKA_CFG_NODE_ID: 1
          KAFKA_CFG_PROCESS_ROLES: 'broker,controller'
        ports:
          - 9094:9094
      redis:
        image: redis/redis-stack-server:7.4.0-v1
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 21
      - name: Build ${{ matrix.service }}
        run: ./mvnw -B -DskipTests -Papptest,prod -pl :${{ matrix.service }} -am install
      - name: Build Native Image for ${{ matrix.service }}
        run: ./mvnw -B -Dimage.tag=latest -DskipTests -Papptest,native,prod -pl :${{ matrix.service }} spring-boot:build-image
      - name: Test Native Image for ${{ matrix.service }}
        run: ./mvnw -B -Papptest -Dspring.kafka.bootstrap.servers=kafka:9094 -pl :${{ matrix.service }} verify
