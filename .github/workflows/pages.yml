name: GitHub Pages

on:
  push:
    branches:
      - main
      - gh-pages
    paths:
      - '.github/workflows/pages.yml'
      - 'docs/**'
      - 'index.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          lfs: true
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production
      - name: Include Helm chart index
        run: |
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            if git show origin/gh-pages:index.yaml > /dev/null 2>&1; then
              git show origin/gh-pages:index.yaml > docs/_site/index.yaml
              echo "Helm chart index.yaml merged into site output."
            else
              echo "No index.yaml found on gh-pages branch - skipping."
            fi
          else
            echo "No gh-pages branch found - skipping Helm index merge."
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/_site
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
