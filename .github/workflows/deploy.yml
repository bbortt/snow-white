name: Deployments

on:
  push:
    tags:
      - v*

jobs:
  publish-maven-packages:
    name: 'Publish Maven Packages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Build with Maven
        run: ./mvnw -B -b smart -T4C -DskipTests -Pprod -pl :commons,:annotation-api,:openapi-generator,:spring-web-autoconfiguration -am clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-cli:
    name: 'Publish CLI'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Build with Maven
        run: ./mvnw -B -b smart -T4C -DskipTests -Pprod -pl :cli -am clean install
      - name: Upload CLI Artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{  github.ref_name }}" toolkit/cli/target/snow-white-linux-arm64
          gh release upload "${{  github.ref_name }}" toolkit/cli/target/snow-white-linux-x64
          gh release upload "${{  github.ref_name }}" toolkit/cli/target/snow-white-macos-arm64
          gh release upload "${{  github.ref_name }}" toolkit/cli/target/snow-white-macos-x64
          gh release upload "${{  github.ref_name }}" toolkit/cli/target/snow-white-windows-x64.exe
      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build CLI Image
        run: |
          docker build \
            -f "toolkit/cli/Dockerfile" \
            -t "ghcr.io/bbortt/snow-white/toolkit/cli:${{ steps.version.outputs.VERSION }}" \
            --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --build-arg PROJECT_VERSION="${{ steps.version.outputs.VERSION }}" \
            --push \
            "toolkit/cli"
  publish-helm-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # ratchet:pnpm/action-setup@v6.0.0
        with:
          run_install: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'
      - name: Install Dependencies
        run: pnpm install
        working-directory: 'helm'
      - name: Bump Chart appVersion
        run: npx --no-install ts-node scripts/bump-chart-version.ts "${{ steps.version.outputs.VERSION }}"
        working-directory: 'helm'
      - name: Add Helm Repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add influxdata https://helm.influxdata.com
          helm repo add kafbat-ui https://kafbat.github.io/helm-charts
      - name: Git Configuration
        run: |
          git config user.name "Timon Borter"
          git config user.email "timon.borter@gmx.ch"
      - name: Release Helm Chart
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # ratchet:helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        with:
          charts_dir: 'helm/charts'
  publish-images:
    name: 'Publish JDK-based Images'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          lfs: true
          submodules: true
      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Build with Maven
        run: |
          ./mvnw -B clean install \
            -b smart -T4C \
            -Pprod \
            -DskipTests \
            -Dfrontend.test.skip=true \
            -pl :api-gateway,:api-sync-job,:openapi-coverage-stream -am
      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build JDK Images
        run: .github/scripts/build-oci-images.sh "${{ steps.version.outputs.VERSION }}" "ghcr.io" "--push"
  publish-native-images:
    name: 'Publish Native Image'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          [
            api-index-api,
            otel-event-filter-stream,
            quality-gate-api,
            report-coordinator-api,
          ]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          submodules: true
      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          cache: maven
          distribution: 'temurin'
          java-version: 25
      - name: Build with Maven
        run: ./mvnw -B -b smart -T4C -DskipTests -Pprod -pl :${{ matrix.service }} -am clean install
      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Native Image
        run: |
          ./mvnw -B spring-boot:build-image \
            -b smart -T4C \
            -Dimage.tag="${{ steps.version.outputs.VERSION }}" \
            -DskipTests -Pnative,prod \
            -pl :${{ matrix.service }}
      - name: Push Native Image
        run: docker image push "ghcr.io/bbortt/snow-white/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}"
