title: Snow-White
description: >
  API Coverage Analysis & Observability - Connect OpenAPI specs with OpenTelemetry traces
  to unlock endpoint coverage insights, quality gates, and performance analysis.

theme: just-the-docs

url: https://bbortt.github.io
baseurl: /snow-white

logo: 'https://raw.githubusercontent.com/bbortt/snow-white/main/.github/logo.png'

search_enabled: true
search.heading_level: 2

aux_links:
  'GitHub ↗':
    - https://github.com/bbortt/snow-white
aux_links_new_tab: true

footer_content: >
  Copyright &copy; 2024–2025 Timon Borter.
  Licensed under the <a href="license">PolyForm Small Business License 1.0.0</a>.

back_to_top: true
back_to_top_text: 'Back to top'

plugins:
  - jekyll-seo-tag

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - architecture.puml
  - Gemfile
  - Gemfile.lock
