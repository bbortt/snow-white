remote_theme: 'mmistakes/minimal-mistakes'
minimal_mistakes_skin: 'snow-white'

locale: 'en-US'
title: 'Snow-White'
title_separator: ' | '
subtitle: 'API Coverage & Observability'
name: 'Timon Borter'
description: >
  Connect OpenAPI specifications with OpenTelemetry traces to unlock
  endpoint coverage insights, quality gates, and performance analysis.
url: 'https://bbortt.github.io'
baseurl: '/snow-white'
repository: 'bbortt/snow-white'
logo: '/assets/images/logo.png'

search: true
search_full_content: true

author:
  name: 'Timon Borter'
  email: 'timon.borter@gmx.ch'
  links:
    - label: 'GitHub'
      icon: 'fab fa-fw fa-github'
      url: 'https://github.com/bbortt'

footer:
  links:
    - label: 'GitHub'
      icon: 'fab fa-fw fa-github'
      url: 'https://github.com/bbortt/snow-white'

include:
  - _pages

exclude:
  - '*.puml'
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

defaults:
  - scope:
      path: '_pages'
      type: pages
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: 'docs'

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
