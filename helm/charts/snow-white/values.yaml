snow-white:
  imageRegistry: ghcr.io
  kafka-event-filter:
    image:
      name: bbortt/snow-white/kafka-event-filter

# Infrastructure
kafka:
  enabled: true

postgresql:
  enabled: true

redis:
  enabled: true

couchbase-operator:
  enabled: true
  install:
    couchbaseOperator: true
    admissionController: false
    couchbaseCluster: true
    syncGateway: false
