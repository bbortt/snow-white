global:
  # -- List of image pull secrets.
  # @section -- Corporate Settings
  imagePullSecrets: []

# -- Labels applied to infrastructure resources.
# @default -- `app.kubernetes.io/part-of: snow-white`
# @section -- Infrastructure
commonLabels:
  app.kubernetes.io/part-of: 'snow-white'

# -- Pod affinity preset.
# Ignored if `affinity` is set.
# Allowed values: `soft`, `hard`.
# @section -- Scheduling and Affinity
podAffinityPreset: ''

# -- Pod anti-affinity preset.
# Ignored if `affinity` is set.
# Allowed values: `soft`, `hard`.
# @section -- Scheduling and Affinity
podAntiAffinityPreset: 'soft'

nodeAffinityPreset:
  # -- Node affinity preset configuration.
  # Ignored if `affinity` is set.
  # Allowed values: `soft` or `hard`,
  # @section -- Scheduling and Affinity
  type: ''
  # -- Node label key to match.
  # Ignored if `affinity` is set.
  # E.g.: `key: "kubernetes.io/e2e-az-name"`.
  # @section -- Scheduling and Affinity
  key: ''
  # -- Node label values to match.
  # Ignored if `affinity` is set.
  # E.g.: `values: [ 'e2e-az1', 'e2e-az2' ]`.
  # @section -- Scheduling and Affinity
  values: []

# -- Custom affinity rules.
# Overrides all presets.
# @section -- Scheduling and Affinity
affinity: {}

image:
  # -- Image pull policy.
  # @section -- Image Parameters
  pullPolicy: 'Always'

jssecacerts:
  # -- Key inside the secret that contains the `jssecacerts` data.
  # @section -- Advanced Configuration
  key: ''
  # -- Name of secret containing the `jssecacerts`.
  # @section -- Advanced Configuration
  secretName: ''

snowWhite:
  # -- Deployment mode of Snow-White.
  # Allowed values: `minimal`, `high-available`, `autoscale`.
  # @section -- Availability
  mode: 'high-available'

  image:
    # -- Image registry for Snow-White components.
    # @section -- Corporate Settings
    registry: 'ghcr.io'

  # -- Number of old ReplicaSets to retain.
  # @section -- Advanced Configuration
  revisionHistoryLimit: 3

  # -- Log pattern for Snow-White pods.
  # @section -- Advanced Configuration
  logPattern: '%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX} level="%level" thread="%thread" logger="%logger"{2}%replace(%mdc{trace_id}){^(.+)$, traceId="$1"} msg="%msg"%n%ex'

  # -- Annotations for Snow-White pods.
  # @section -- Advanced Configuration
  podAnnotations: {}

  rollout:
    # -- Max pods above desired during rolling update.
    # @section -- Availability
    maxSurge: '25%'

  ingress:
    # -- Enable ingress.
    # @section -- Snow-White Ingress
    enabled: true
    # -- Ingress class name.
    # @section -- Snow-White Ingress
    className: nginx
    # -- .Ingress hostname.
    # Must be specified when `ingress.enabled=true`.
    # @section -- Snow-White Ingress
    host: ''
    # -- Enable TLS.
    # @section -- Snow-White Ingress
    tls: true

  housekeeping:
    # -- Enable housekeeping jobs of Snow-White.
    # @section -- Housekeeping
    enabled: true
    # -- Cron schedule for housekeeping jobs.
    # @section -- Housekeeping
    schedule: '* * * * *'
    # -- The number of failed finished jobs to keep.
    # @section -- Housekeeping
    failedJobsHistoryLimit: 3
    # -- The number of successful finished jobs to keep.
    # @section -- Housekeeping
    successfulJobsHistoryLimit: 1
    # -- The duration in seconds relative to the startTime that the job may be active.
    # @section -- Housekeeping
    activeDeadlineSeconds: 1800
    image:
      # -- Image registry.
      # @section -- Housekeeping
      registry: docker.io
      # -- Image name.
      # @section -- Housekeeping
      name: curlimages/curl
      # -- Image tag.
      # @section -- Housekeeping
      tag: 8.18.0

  kafka:
    # -- Kafka bootstrap server list.
    # @default -- The chart will connect to the provisioned Kafka StatefulSet automatically.
    # @section -- Snow-White Kafka
    brokers: []
    # -- Initialize Kafka topics.
    # @section -- Snow-White Kafka
    initTopics: 'true'
    # -- Calculation request topic.
    # @section -- Snow-White Kafka
    calculationRequestTopic: 'snow-white-calculation-request'
    # -- OpenAPI calculation response topic
    # @section -- Snow-White Kafka
    openapiCalculationResponseTopic: 'snow-white-openapi-calculation-response'

  apiIndexApi:
    image:
      # -- Image tag.
      # @section -- Snow-White API Index API
      tag: ''
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White API Index API
    additionalEnvs: []
  apiGateway:
    image:
      # -- Image tag.
      # @section -- Snow-White API Gateway
      tag: ''
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White API Gateway
    additionalEnvs: []
    service:
      # -- Type of Kubernetes service.
      # @section -- Snow-White API Gateway
      type: ClusterIP
      # -- Exposed port for the API Gateway service.
      # @section -- Snow-White API Gateway
      port: 80
  qualityGateApi:
    image:
      # -- Image tag.
      # @section -- Snow-White Quality Gate API
      tag: ''
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White Quality Gate API
    additionalEnvs: []
  apiSyncJob:
    # -- Deploy CronJob for API ingestion alongside Snow-White.
    # @section -- Snow-White API Sync Job
    enabled: false
    image:
      # -- Image tag.
      # @section -- Snow-White API Sync Job
      tag: ''
    # -- The number of failed finished jobs to keep.
    # @section -- Snow-White API Sync Job
    failedJobsHistoryLimit: 3
    # -- The number of successful finished jobs to keep.
    # @section -- Snow-White API Sync Job
    successfulJobsHistoryLimit: 1
    # -- The duration in seconds relative to the startTime that the job may be active.
    # @section -- Snow-White API Sync Job
    activeDeadlineSeconds: 1800
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White API Sync Job
    additionalEnvs: []
    artifactory:
      # -- Artifactory Base URL (e.g. http://localhost:8092/artifactory).
      # @section -- Snow-White API Sync Job
      baseUrl: ''
      # -- Artifactory repository holding API index.
      # @section -- Snow-White API Sync Job
      repository: ''
      # -- Custom JSON path to the API name inside an OpenAPI specification.
      # @default -- `info.title`
      # @section -- Snow-White API Sync Job
      customApiNameJsonPath: ''
      # -- Custom JSON path to the API version inside an OpenAPI specification.
      # @default -- `info.version`
      # @section -- Snow-White API Sync Job
      customApiVersionJsonPath: ''
      # -- Custom JSON path to the service name inside an OpenAPI specification.
      # @default -- `info.extensions.x-service-name`
      # @section -- Snow-White API Sync Job
      customServiceNameJsonPath: ''
    # -- Cron schedule for API synchronization.
    # @section -- Snow-White API Sync Job
    schedule: '0 * * * *'
    resources:
      memory:
        # -- Memory resource limit.
        # @section -- Snow-White API Sync Job
        limit: '1Gi'
        # -- Memory resource request.
        # @section -- Snow-White API Sync Job
        request: '1Gi'
  openapiCoverageStream:
    image:
      # -- Image tag.
      # @section -- Snow-White OpenAPI Coverage Stream
      tag: ''
    # -- Number of replicas to deploy.
    # @section -- Snow-White OpenAPI Coverage Stream
    replicas: 1
    influxdb:
      # -- InfluxDB endpoint.
      # @default -- The chart will connect to the provisioned InfluxDB StatefulSet automatically.
      # @section -- Snow-White OpenAPI Coverage Stream
      endpoint: ''
      # -- InfluxDB token.
      # @default -- The chart will connect to the provisioned InfluxDB StatefulSet automatically.
      # @section -- Snow-White OpenAPI Coverage Stream
      token: ''
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White OpenAPI Coverage Stream
    additionalEnvs: []
  otelEventFilterStream:
    image:
      # -- Image tag.
      # @section -- Snow-White OTel Event Filter Stream
      tag: ''
    # -- Number of replicas to deploy.
    # @section -- Snow-White OTel Event Filter Stream
    replicas: 1
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White OTel Event Filter Stream
    additionalEnvs: []
  reportCoordinatorApi:
    image:
      # -- Image tag.
      # @section -- Snow-White Report Coordinator API
      tag: ''
    # -- Additional environment variables forwarded to container.
    # @section -- Snow-White Report Coordinator API
    additionalEnvs: []

influxdb2:
  # -- Deploy InfluxDB StatefulSet alongside Snow-White.
  # @section -- Infrastructure (InfluxDB)
  enabled: true
  pdb:
    create: false
  adminUser:
    # -- InfluxDB organization.
    # @section -- OpenTelemetry Collector
    organization: snow-white
    # -- InfluxDB bucket.
    # @section -- OpenTelemetry Collector
    bucket: snow-white

kafka:
  # -- Deploy Kafka StatefulSet alongside Snow-White.
  # @section -- Infrastructure (Kafka)
  enabled: true
  image:
    # -- Image registry.
    # @section -- Infrastructure (Kafka)
    registry: docker.io
    # -- Image name.
    # @section -- Infrastructure (Kafka)
    name: confluentinc/cp-kafka
    # -- Image tag.
    # @section -- Infrastructure (Kafka)
    tag: 8.2.0
  # -- Kafka cluster ID.
  # Run "kafka-storage random-uuid" to generate one.
  # @section -- Infrastructure (Kafka)
  clusterId: 'NmE4MjRhYjI1MjkwNGI5ZG' # run "kafka-storage random-uuid"
  persistence:
    # -- Storage class for Kafka persistent volumes.
    # @section -- Infrastructure (Kafka)
    storageClass: 'hostpath'
    # -- Size of the storage for Kafka.
    # @section -- Infrastructure (Kafka)
    size: 10Gi

kafka-ui:
  # -- Install kafbat/kafka-ui alongside Snow-White for debugging.
  # @section -- Infrastructure (Kafka)
  enabled: false
  yamlApplicationConfigConfigMap:
    name: kafbat-ui-configmap

otelCollector:
  image:
    # -- Image registry.
    # @section -- OpenTelemetry Collector
    registry: docker.io
    # -- Image tag.
    # @section -- OpenTelemetry Collector
    tag: '0.149.0'
  # -- Whether to expose the OTeL collector through the (public) ingress.
  # @section -- OpenTelemetry Collector
  exposeThroughIngress: true
  connectToExternalOtelCollector:
    # -- Disable (infrastructure) metrics export entirely.
    # @section -- OpenTelemetry Collector
    exportLogs: true
    # -- Disable (infrastructure) metrics export entirely.
    # @section -- OpenTelemetry Collector
    exportMetrics: true
    # -- Disable (infrastructure) traces export entirely. Snow-White internal tracing is still functional.
    # @section -- OpenTelemetry Collector
    exportTraces: true
    # -- Configure this endpoint to expose Snow-White internal telemetry data to external OTeL collector for monitoring.
    # @section -- OpenTelemetry Collector
    endpoint: ''
    tls:
      # -- Whether the external OTeL collector connection may be insecure.
      # @section -- OpenTelemetry Collector
      insecure: true
  # -- Custom attribute key identifying the API name.
  # @default -- `api.name`
  # @section -- OpenTelemetry Collector
  apiNameAttributeKey: ''
  # -- Custom attribute key identifying the API version.
  # @default -- `api.version`
  # @section -- OpenTelemetry Collector
  apiVersionAttributeKey: ''
  # -- Custom attribute key identifying the Service name.
  # @default -- `service.name`
  # @section -- OpenTelemetry Collector
  serviceNameAttributeKey: ''

  influxdb:
    # -- InfluxDB endpoint.
    # @default -- The chart will connect to the provisioned InfluxDB StatefulSet automatically.
    # @section -- OpenTelemetry Collector
    endpoint: ''
  kafka:
    # -- The "inbound" Kafka topic for unfiltered events.
    # @section -- OpenTelemetry Collector
    inboundTopic: snow-white_inbound
    # -- The "outbound" Kafka filtered events being persisted to InfluxDB.
    # @section -- OpenTelemetry Collector
    outbountTopic: snow-white_outbound
  pipeline:
    # -- Attributes to clean up from span resources.
    # Reduces required storage space, but limits filter functionality!
    # @section -- OpenTelemetry Collector
    resourceCleanup:
      attributes:
        - action: delete
          pattern: ^process\..+
        - action: delete
          pattern: ^telemetry\..+

postgresql:
  # -- Deploy PostgreSQL StatefulSet alongside Snow-White.
  # @section -- Infrastructure (PostgreSQL)
  enabled: true
  # The architecture of the PostgreSQL deployment (e.g., standalone).
  architecture: standalone
  primary:
    # Extra environment variables for the primary PostgreSQL container.
    extraEnvVars:
      - name: 'API_INDEX_DATASOURCE_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'api-index-password'
      - name: 'API_INDEX_FLYWAY_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'api-index-flyway-password'
      - name: 'REPORT_COORDINATOR_DATASOURCE_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'report-coord-password'
      - name: 'REPORT_COORDINATOR_FLYWAY_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'report-coord-flyway-password'
      - name: 'QUALITY_GATE_DATASOURCE_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'quality-gate-password'
      - name: 'QUALITY_GATE_FLYWAY_PASSWORD'
        valueFrom:
          secretKeyRef:
            name: 'snow-white-postgresql-credentials'
            key: 'quality-gate-flyway-password'
    initdb:
      # -- Name of the ConfigMap containing initialization scripts for PostgreSQL.
      # @section -- Infrastructure (PostgreSQL)
      scriptsConfigMap: 'snow-white-postgresql-init-scripts'
